name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.6.0)'
        required: true
        type: string

permissions:
  contents: write   # GitHub Releases upload (cargo-dist host job) + existing release job
  packages: write   # ghcr.io push (existing docker/build-push-action)
  id-token: write   # OIDC (mcp-publisher + cargo-dist)

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/outline-mcp

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Verify server.json version matches
        run: |
          SERVER_VERSION=$(jq -r '.version' server.json)
          if [ "$SERVER_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::server.json version ($SERVER_VERSION) != tag version (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin mcp-publisher
          mcp-publisher --version

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

  # ------------------------------------------------------------------
  # cargo-dist jobs — multi-target binary distribution.
  # Runs alongside the `release` job (Docker + MCP Registry) on tag push.
  # See dist.toml at repo root for target / installer configuration.
  # ------------------------------------------------------------------
  plan:
    runs-on: ubuntu-latest
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-dist
        run: cargo install cargo-dist --version "0.28.0"
      - id: plan
        run: cargo dist plan --output-format=json

  build-global-artifacts:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-dist
        run: cargo install cargo-dist --version "0.28.0"
      - run: cargo dist build --artifacts=global

  build-local-artifacts:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-dist
        run: cargo install cargo-dist --version "0.28.0"
      - run: cargo dist build --target=${{ matrix.target }} --artifacts=local

  host:
    needs: [build-global-artifacts, build-local-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-dist
        run: cargo install cargo-dist --version "0.28.0"
      - name: Create GitHub Release + upload artifacts
        run: cargo dist host --steps=upload,release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
